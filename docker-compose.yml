services:
  actions-runner:
    container_name: actions-runner-<NAME>
    image: ghcr.io/crazyuploader/actions-runner:latest
    restart: unless-stopped
    environment:
      - RUNNER_URL=<RUNNER_URL>
      - TOKEN=<ACTIONS_RUNNER_TOKEN>
    volumes:
      - ./runner-config:/runner-config
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2.0"
    #       memory: 4g
    #     reservations:
    #       cpus: "0.5"
    #       memory: 512m
    logging:
      options:
        max-size: 64m
