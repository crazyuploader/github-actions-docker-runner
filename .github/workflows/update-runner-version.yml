name: Update Runner Version

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest runner version
        id: get_version
        run: |
          set -e
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/actions/runner/releases/latest")
          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' | sed 's/v//')
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" == "null" ]; then
            echo "Failed to fetch latest runner version"
            exit 1
          fi
          RELEASE_BODY=$(echo "$RESPONSE" | jq -r '.body')
          HASH_AMD64=$(echo "$RELEASE_BODY" | grep -oP '(?<=BEGIN SHA linux-x64 -->)[a-f0-9]{64}')
          HASH_ARM64=$(echo "$RELEASE_BODY" | grep -oP '(?<=BEGIN SHA linux-arm64 -->)[a-f0-9]{64}')
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "hash_amd64=$HASH_AMD64" >> $GITHUB_OUTPUT
          echo "hash_arm64=$HASH_ARM64" >> $GITHUB_OUTPUT

      - name: Get current runner version
        id: get_current_version
        run: |
          set -e
          CURRENT_VERSION=$(grep "^ARG RUNNER_VERSION=" Dockerfile | sed 's/ARG RUNNER_VERSION=//g')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Update files
        if: steps.get_version.outputs.latest_version != steps.get_current_version.outputs.current_version
        env:
          VERSION: ${{ steps.get_version.outputs.latest_version }}
          HASH_AMD64: ${{ steps.get_version.outputs.hash_amd64 }}
          HASH_ARM64: ${{ steps.get_version.outputs.hash_arm64 }}
        run: |
          set -e

          # Validate checksums
          for var in HASH_AMD64 HASH_ARM64; do
            if ! [[ ${!var} =~ ^[a-f0-9]{64}$ ]]; then
              echo "Invalid checksum for ${var}: ${!var}"
              exit 1
            fi
          done

          # Update Dockerfile
          sed -i "s/^\(ARG RUNNER_VERSION=\).*/\1${VERSION}/" Dockerfile
          sed -i "s/^\(ARG RUNNER_HASH_AMD64=\).*/\1${HASH_AMD64}/" Dockerfile
          sed -i "s/^\(ARG RUNNER_HASH_ARM64=\).*/\1${HASH_ARM64}/" Dockerfile
          sed -i "s/^\(LABEL.*runner-default-version=\)\".*/\1\"${VERSION}\"/" Dockerfile

          # Update workflow file
          sed -i "s/^\(  IMAGE_TAG: \).*/\1${VERSION}/" .github/workflows/docker-publish.yml

      - name: Check for changes
        id: check_changes
        run: |
          set -e
          git add -A
          if git diff --quiet --cached; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "Update runner version to ${{ steps.get_version.outputs.latest_version }}"
          title: "Update runner version to ${{ steps.get_version.outputs.latest_version }}"
          body: "This PR updates the runner version to ${{ steps.get_version.outputs.latest_version }} and the corresponding checksums."
          branch: "update-runner-version-${{ steps.get_version.outputs.latest_version }}"
          delete-branch: true

      - name: Cleanup on failure
        if: failure()
        run: |
          git push origin --delete "update-runner-version-${{ steps.get_version.outputs.latest_version }}" || true
